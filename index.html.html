<DOCTYPE html>
    <html>
        <head>
                      <title>Mi Lista de Tareas</title>
                      <link rel="stylesheet" href="style.css">

        </head>
        <body>
  <div class="contenedor">
    <h1>Mi Lista de Tareas</h1>
    <input type="text" id="buscador" placeholder="🔎 Buscar tarea...">
    <input type="text" id="inputTarea" placeholder="✏️ Escribir tarea...">
    <button id="btnAgregar">➕ Agregar</button>
    <input type="date" id="inputFecha">
<p id="contador">Tareas pendientes: 0</p>
<p id="contadorVencidas">⚠ Tareas vencidas: 0 </p>
<p id="vencenHoy"></p>

<div class="filtros">
    <button data-filtro="Todas">Todas</button>
    <button data-filtro="pendientes">Pendientes</button>
    <button data-filtro="completadas">Completadas</button>

</div>
    <ul id="lista"></ul>
    <p id="estadisticas"></p>
  </div>
<button id="modoOscuroBtn">🌙 Modo oscuro</button>
<button id="exportar">⬇ Exportar tareas</button>

  <script src="reto2.js"></script>
        </body>
    </html>
</DOCTYPE>
